<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私のカッコイイウェブサイト</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            margin: 0;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        nav {
            margin-top: 10px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        nav a:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        main {
            flex: 1;
            padding: 40px;
            text-align: center;
        }
        .intro {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 10px;
            margin: 20px auto;
            max-width: 600px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .intro h2 {
            margin-top: 0;
        }
        .hobby {
            margin-top: 20px;
        }
        button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }
        button:hover {
            background: #ff5252;
        }
        footer {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>私のカッコイイウェブサイト</h1>
        <nav>
            <a href="#home">ホーム</a>
            <a href="#about">自己紹介</a>
            <a href="#contact">連絡先</a>
        </nav>
    </header>
    <main>
        <div class="intro" id="home">
            <h2>ようこそ！</h2>
            <p>このウェブサイトは、モダンでクールなデザインで作られています。</p>
        </div>
        <div class="intro" id="about">
            <h2>自己紹介</h2>
            <p>こんにちは！ 私はウェブ開発が好きです。</p>
            <div class="hobby">
                <p>趣味は読書です。特にSF小説が好きです。</p>
                <button onclick="changeColor()">色を変える</button>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 私のウェブサイト</p>
    </footer>
    <script>
        function changeColor() {
            const body = document.body;
            const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            body.style.background = `linear-gradient(135deg, ${randomColor} 0%, #764ba2 100%)`;
        }
    </script>
</body>
</html>
